<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LB Prestige Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #0a0a0a; --main-bg: #121212; --gold: #c9a84c; --card: #1e1e1e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--main-bg); color: #e0e0e0; display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid #333; position: fixed; height: 100vh; padding: 30px 20px; }
        .sidebar h1 { color: var(--gold); font-family: 'Cormorant Garamond'; font-size: 1.5rem; margin-bottom: 50px; }
        .nav-item { padding: 15px; color: #888; cursor: pointer; transition: 0.3s; border-radius: 8px; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: var(--gold); }

        /* CONTENT */
        .content { margin-left: 260px; flex: 1; padding: 40px; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* STAT CARDS */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; position: relative; }
        .stat-card h3 { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card .value { font-size: 2rem; color: var(--gold); font-family: 'Cormorant Garamond'; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold); border-radius: 4px 0 0 4px; }

        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        input, select, textarea { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>LB Prestige Admin</h1>
    <div class="nav-item active" onclick="tab('dash')">📊 Tableau de bord</div>
    <div class="nav-item" onclick="tab('codes')">🔑 Codes & WhatsApp</div>
    <div class="nav-item" onclick="tab('reviews')">⭐ Avis Clients</div>
    <div class="nav-item" onclick="tab('signs')">📜 Signatures</div>
</div>

<div class="content">
    <div id="dash-panel" class="panel active">
        <h2>Tableau de bord</h2>
        <div class="stats-row">
            <div class="stat-card"><h3>Avis Total</h3><div class="value" id="countReviews">0</div></div>
            <div class="stat-card"><h3>Note Moyenne</h3><div class="value" id="avgNote">0.0</div></div>
            <div class="stat-card"><h3>Signatures</h3><div class="value" id="countSigns">0</div></div>
            <div class="stat-card"><h3>Logements</h3><div class="value">02</div></div>
        </div>
    </div>

    <div id="codes-panel" class="panel">
        <h2>Générer un message client</h2>
        <div class="card">
            <label>Prénom du voyageur</label><input type="text" id="cName" placeholder="Ex: Lionel">
            <label>Code d'accès personnalisé</label><input type="text" id="cCode" placeholder="Ex: LB-005">
            <button class="btn" style="margin-top:20px;" onclick="createClient()">Générer le lien & Message</button>
        </div>
        <div id="resultBox" class="card" style="display:none;">
            <p style="color:var(--gold); margin-bottom:10px;">Message prêt pour WhatsApp :</p>
            <textarea id="waText" readonly style="height:150px; font-size:0.8rem;"></textarea>
            <button class="btn" style="margin-top:15px;" onclick="copyAndOpenWA()">Copier et Envoyer</button>
        </div>
    </div>

    <div id="reviews-panel" class="panel">
        <h2>Historique des avis</h2>
        <div id="revList"></div>
    </div>

    <div id="signs-panel" class="panel">
        <h2>Signatures du Règlement</h2>
        <div id="signList"></div>
    </div>
</div>

<script>
    const BIN_ID = '6785b5dcacd3cb34a8b3edd9';
    const KEY = '$2a$10$43LNnZeebsdi37UiTugFuceUndIIT9oqJLU7qUM0ZN5dOrfA8kR2gC';

    function tab(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id + '-panel').classList.add('active');
        if(id !== 'codes') loadData();
    }

    async function loadData() {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Master-Key': KEY}});
        const data = await res.json();
        const r = data.record;

        document.getElementById('countReviews').innerText = (r.reviews || []).length;
        document.getElementById('countSigns').innerText = (r.signatures || []).length;
        
        // Render Signatures
        const sl = document.getElementById('signList'); sl.innerHTML = "";
        (r.signatures || []).forEach(s => sl.innerHTML += `<div class="card">✅ <b>${s.name}</b> (Code: ${s.code}) a signé le ${s.date}</div>`);

        // Render Reviews
        const rl = document.getElementById('revList'); rl.innerHTML = "";
        (r.reviews || []).forEach(rv => rl.innerHTML += `<div class="card"><b>${rv.name}</b> (${rv.rating}★): ${rv.comment}</div>`);
    }

    async function createClient() {
        const name = document.getElementById('cName').value;
        const code = document.getElementById('cCode').value.toUpperCase();
        if(!name || !code) return alert("Remplissez les deux champs");

        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Master-Key': KEY}});
        const data = await res.json();
        data.record.codes[code] = { name };
        
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT', headers: {'Content-Type': 'application/json', 'X-Master-Key': KEY},
            body: JSON.stringify(data.record)
        });

        const link = `https://lbprestige.github.io/LB-PRESTIGE-APPART/index.html?key=${code}`;
        const msg = `🔹 Bienvenue au LB Prestige Cosy Appart, ${name} !\n\nVotre espace client personnel est prêt :\n👉 ${link}\n\nVotre code d'accès : ${code}\n\nN'hésitez pas à consulter le guide d'accueil (Wi-Fi, Netflix, Parking, Cuisine) et à approuver le règlement intérieur.\n\nBon séjour ! ✨\nLB Prestige Appart`;
        
        document.getElementById('waText').value = msg;
        document.getElementById('resultBox').style.display = "block";
    }

    function copyAndOpenWA() {
        const copyText = document.getElementById('waText');
        copyText.select(); document.execCommand('copy');
        window.open(`https://wa.me/?text=${encodeURIComponent(copyText.value)}`, '_blank');
    }

    window.onload = loadData;
</script>
</body>
</html>
