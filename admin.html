<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LB Prestige - Dashboard Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #1F1F1F; --sidebar-hover: #292929; --gold: #B89548; --bg-body: #F4F6F8; --white: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg-body); display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; padding: 40px 0; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        .sidebar h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--gold); text-align: center; margin-bottom: 50px; letter-spacing: 2px; }
        .nav-item { padding: 18px 30px; cursor: pointer; color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 15px; }
        .nav-item:hover { background: var(--sidebar-hover); color: white; }
        .nav-item.active { background: var(--sidebar-hover); color: var(--gold); border-left-color: var(--gold); font-weight: 600; }
        .content { margin-left: 280px; flex: 1; padding: 50px; }
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; margin-bottom: 30px; color: #333; }
        .card { background: var(--white); padding: 30px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #AAA; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #EEE; border-radius: 4px; font-family: inherit; outline: none; }
        .btn { background: var(--gold); color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .btn:hover { opacity: 0.9; }
        .list-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #F5F5F5; align-items: center; }
        .rev-card { padding: 20px; border: 1px solid #F5F5F5; border-radius: 8px; margin-bottom: 15px; }
        .rev-stars { color: var(--gold); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>LB PRESTIGE</h1>
    <div class="nav-item active" onclick="showPanel('codes', this)">👤 Codes Clients</div>
    <div class="nav-item" onclick="showPanel('reviews', this)">⭐ Avis Clients</div>
    <div class="nav-item" onclick="showPanel('wa', this)">💬 WhatsApp Rapide</div>
    <div class="nav-item" onclick="showPanel('config', this)">⚙️ Configuration</div>
</div>

<div class="content">
    <div id="panel-codes" class="panel active">
        <h2>Gestion des Accès</h2>
        <div class="card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div><label>Nom du Client</label><input type="text" id="newName" placeholder="Marie Dupont"></div>
                <div><label>Code (Ex: MD2024)</label><input type="text" id="newCode"></div>
            </div>
            <button class="btn" onclick="createCode()">Enregistrer le Client</button>
        </div>
        <div class="card" id="listCodes">Chargement...</div>
    </div>

    <div id="panel-reviews" class="panel">
        <h2>Avis Voyageurs</h2>
        <div class="card" id="listReviews">Chargement...</div>
    </div>

    <div id="panel-wa" class="panel">
        <h2>WhatsApp Express</h2>
        <div class="card">
            <label>Numéro client</label><input type="text" id="waPhone" placeholder="237600000000" style="margin-bottom:20px;">
            <label>Message</label><textarea id="waMsg" style="height: 150px; margin-bottom: 20px;"></textarea>
            <button class="btn" onclick="window.open('https://wa.me/'+document.getElementById('waPhone').value+'?text='+encodeURIComponent(document.getElementById('waMsg').value), '_blank')">Envoyer</button>
        </div>
    </div>

    <div id="panel-config" class="panel">
        <h2>Paramètres & Sécurité</h2>
        <div class="card">
            <h3 style="margin-bottom:20px; color:var(--gold); font-family:'Cormorant Garamond';">Modifier mes accès Admin</h3>
            <div class="input-group">
                <label>Nouvel Identifiant</label>
                <input type="text" id="newAdminUser" placeholder="Votre nouveau nom d'admin">
            </div>
            <div class="input-group">
                <label>Nouveau Mot de passe</label>
                <input type="password" id="newAdminPass" placeholder="Votre nouveau mot de passe">
            </div>
            <button class="btn" onclick="updateSecurity()">Mettre à jour mes accès</button>
        </div>
    </div>
</div>

<script>
    const BIN_ID = '6785b5dcacd3cb34a8b3edd9';
    const API_KEY = '$2a$10$43LNnZeebsdi37UiTugFuceUndIIT9oqJLU7qUM0ZN5dOrfA8kR2gC';

    // --- SÉCURITÉ ---
    function updateSecurity() {
        const newUser = document.getElementById('newAdminUser').value.trim();
        const newPass = document.getElementById('newAdminPass').value.trim();
        
        if(newUser) localStorage.setItem('lb_admin_user', newUser);
        if(newPass) localStorage.setItem('lb_admin_pass', newPass);
        
        alert("Identifiants mis à jour ! Ils seront demandés lors de votre prochaine connexion.");
    }

    // On vérifie les identifiants au chargement
    function checkLogin() {
        const savedUser = localStorage.getItem('lb_admin_user') || 'LIONEL BATISTON';
        const savedPass = localStorage.getItem('lb_admin_pass') || 'admin';
        
        const user = prompt("Identifiant Admin :");
        const pass = prompt("Mot de passe :");
        
        if(user !== savedUser || pass !== savedPass) {
            alert("Accès refusé.");
            document.body.innerHTML = "<h1>Accès non autorisé.</h1>";
        }
    }

    function showPanel(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
        document.getElementById('panel-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'codes' || id === 'reviews') fetchData();
    }

    async function fetchData() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Master-Key': API_KEY} });
            const data = await res.json();
            
            const codeList = document.getElementById('listCodes');
            codeList.innerHTML = "<h3>Accès Actuels</h3>";
            const codes = data.record.codes || {};
            for (let c in codes) {
                codeList.innerHTML += `<div class="list-item"><span><b>${codes[c].name}</b> | Code : <span style="color:var(--gold)">${c}</span></span><button class="btn" style="background:#E74C3C; padding:5px 10px; font-size:0.7rem;" onclick="deleteCode('${c}')">Supprimer</button></div>`;
            }

            const revList = document.getElementById('listReviews');
            revList.innerHTML = "";
            const reviews = data.record.reviews || [];
            reviews.forEach(rv => {
                revList.innerHTML += `<div class="rev-card"><div class="rev-header"><b>${rv.clientName}</b> <span class="rev-stars">${'★'.repeat(rv.rating)}</span></div><p style="font-size:0.9rem;">"${rv.comment || 'Sans commentaire'}"</p><div style="font-size:0.7rem; color:#AAA; margin-top:10px;">Le ${rv.date}</div></div>`;
            });
        } catch(e) {}
    }

    async function createCode() {
        const name = document.getElementById('newName').value;
        const code = document.getElementById('newCode').value.toUpperCase();
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Master-Key': API_KEY} });
        const data = await res.json();
        data.record.codes[code] = { name: name };
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: 'PUT', headers: {'Content-Type': 'application/json', 'X-Master-Key': API_KEY}, body: JSON.stringify(data.record) });
        fetchData();
    }

    checkLogin(); // On demande le mot de passe à l'ouverture
    window.onload = fetchData;
</script>
</body>
</html>
